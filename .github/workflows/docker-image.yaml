# Action to build and deploy a multi-platform Docker image from the Dockerfile
# in the repo.
#
# This action is triggered by a push to the main branch when the commits have
# changes to the Dockerfile. It can also be triggered by hand via the web UI or
# the gh CLI tool (gh workflow run docker-image).
#
# When triggered by a push, it will push to the GH registry two image tags:
#   * a 'version' tag where the version is the current date in ISO format
#   * a 'latest' tag pointing to the version tag
#
# When triggered by hand, the workflow will run as a "dry-run" by default. That
# is, it will still set the 'version' tag to the current date in ISO format but
# **it won't tag 'latest' or push the tags to the registry**.
#
# To override these defaults, use the 'IMAGE_VERSION', 'TAG_LATEST' and 'PUSH'
# variables, e.g.:
#
# gh workflow run docker-image -f IMAGE_VERSION=20241101-testing

name: docker-image

on:
  push:
    branches:
      - main
    paths:
      - "*Dockerfile"

  workflow_dispatch:
    inputs:
      IMAGE_VERSION:
        description: "Image Version (default: YYYYMMDD)"
      TAG_LATEST:
        description: "Tag image version as 'latest'"
        default: false
      PUSH:
        description: "Push images to registry"
        default: false

env:
  BASE_IMAGE: debian
  BASE_IMAGE_TAG: bookworm-20240926-slim
  BAZEL_VERSION: 7.4.0
  REPRODUCIBLE_CONTAINERS_VERSION: 0.1.4
  BAZELISK_VERSION: 1.20.0

  REGISTRY: ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |-
            *Dockerfile

      - name: Set up dynamic env
        run: |-
          declare -A TAGS

          TAGS[version]="${{ github.event.inputs.IMAGE_VERSION }}"
          # set default value if version is not set, is empty or an empty string
          if [[ -z "${TAGS[version]+isset}" || -z "${TAGS[version]// }" ]]; then
            TAGS[version]="$(date +%Y%m%d)"
          fi

          GH_EVENT_NAME="${{ github.event_name }}"
          TAG_LATEST="${{ github.event.inputs.TAG_LATEST }}"

          if [[ "$GH_EVENT_NAME" == "push" || "$TAG_LATEST" == "true" ]]; then
            TAGS[latest]="latest"
          fi

          IMAGE_NAME="${{ env.REGISTRY }}/${{ github.repository }}/$BASE_IMAGE"

          {
            for tag in ${!TAGS[@]}; do
              echo "IMAGE_TAG_${tag^^}=$IMAGE_NAME:${TAGS[$tag]}"
            done
          } >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: base.Dockerfile
          platforms: |-
            linux/amd64
            linux/arm64
          build-args: |-
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            BASE_IMAGE_TAG=${{ env.BASE_IMAGE_TAG }}
            REPRODUCIBLE_CONTAINERS_VERSION=${{ env.REPRODUCIBLE_CONTAINERS_VERSION }}
            BAZELISK_VERSION=${{ env.BAZELISK_VERSION }}
            BAZEL_VERSION=${{ env.BAZEL_VERSION }}
          push: ${{ github.event_name == 'push' && true || github.event.inputs.PUSH }}
          tags: |-
            ${{ env.IMAGE_TAG_VERSION }}
            ${{ env.IMAGE_TAG_LATEST }}
          labels: |-
            org.opencontainers.image.source=${{ github.repositoryUrl }}
